name: SwiftLint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - '**.swift'
      - 'Package.swift'
      - 'Sources/**'
      - 'Tests/**'
      - '.swiftlint.yml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.swift'
      - 'Package.swift'
      - 'Sources/**'
      - 'Tests/**'
      - '.swiftlint.yml'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: |
        swiftlint lint --strict --reporter github-actions-logging
